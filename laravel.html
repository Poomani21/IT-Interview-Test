<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    .result-box {
      display: flex;
      gap: 12px;
      margin-top: 15px;
      flex-wrap: wrap;
    }
    
    .mini-card {
      flex: 1;
      min-width: 110px;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
    }
    
    .mini-card h4 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    
    .mini-card p {
      margin: 0;
      font-size: 22px;
      font-weight: bold;
    }
    
    .correct-card {
      background: #dcfce7;
      color: #166534;
    }
    
    .wrong-card {
      background: #fee2e2;
      color: #991b1b;
    }
    </style>
    
</head>
<body>

<div class="header">
    <button id="backToDashboard" class="icon-btn" title="Back">
        <svg class="icon" viewBox="0 0 24 24" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      
      <h2>Laravel Practice Test</h2>
  <div id="userName"></div>
</div>

<div class="summary-bar">
  <div class="summary-card">
    <h4>Total Bookmarks</h4>
    <p id="bookmarkCount">0</p>
  </div>
</div>

<div class="levels">
    <div class="card" data-level="basic">
      <h3>Basic Level</h3>
      <p>Beginner Laravel Questions</p>
      <div class="level-score">Score: <span id="basicScore">0</span></div>
  
      <div class="result-box">
        <div class="mini-card correct-card">
          <h4>Correct</h4>
          <p id="basicCorrect">0</p>
        </div>
        <div class="mini-card wrong-card">
          <h4>Wrong</h4>
          <p id="basicWrong">0</p>
        </div>
      </div>
    </div>
  
    <div class="card" data-level="medium">
      <h3>Medium Level</h3>
      <p>Intermediate Laravel Questions</p>
      <div class="level-score">Score: <span id="mediumScore">0</span></div>
  
      <div class="result-box">
        <div class="mini-card correct-card">
          <h4>Correct</h4>
          <p id="mediumCorrect">0</p>
        </div>
        <div class="mini-card wrong-card">
          <h4>Wrong</h4>
          <p id="mediumWrong">0</p>
        </div>
      </div>
    </div>
  
    <div class="card" data-level="hard">
      <h3>Hard Level</h3>
      <p>Advanced Laravel Questions</p>
      <div class="level-score">Score: <span id="hardScore">0</span></div>
  
      <div class="result-box">
        <div class="mini-card correct-card">
          <h4>Correct</h4>
          <p id="hardCorrect">0</p>
        </div>
        <div class="mini-card wrong-card">
          <h4>Wrong</h4>
          <p id="hardWrong">0</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    const bookmarks = JSON.parse(localStorage.getItem("laravel_bookmarks")) || [];
    
    if (user && user.name) {
      $("#userName").text(user.name);
    } else {
      $("#userName").text("Guest User");
    }
    
    $("#basicScore").text(localStorage.getItem("laravel_score_basic") || 0);
    $("#mediumScore").text(localStorage.getItem("laravel_score_medium") || 0);
    $("#hardScore").text(localStorage.getItem("laravel_score_hard") || 0);
    
    $("#basicCorrect").text(localStorage.getItem("laravel_correct_basic") || 0);
    $("#basicWrong").text(localStorage.getItem("laravel_wrong_basic") || 0);
    
    $("#mediumCorrect").text(localStorage.getItem("laravel_correct_medium") || 0);
    $("#mediumWrong").text(localStorage.getItem("laravel_wrong_medium") || 0);
    
    $("#hardCorrect").text(localStorage.getItem("laravel_correct_hard") || 0);
    $("#hardWrong").text(localStorage.getItem("laravel_wrong_hard") || 0);
    
    $("#bookmarkCount").text(bookmarks.length);
    
    $(".card").click(function () {
      let level = $(this).data("level");
      localStorage.setItem("laravel_level", level);
      window.location = "practice.html";
    });
    
    $("#backToDashboard").click(function () {
      window.location.href = "dashboard.html";
    });
    </script>

</body>
</html>
